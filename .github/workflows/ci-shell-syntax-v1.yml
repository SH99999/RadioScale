name: ci-shell-syntax-v1

on:
  push:
    branches:
      - main
      - dev/**
      - si/governance
  pull_request:

permissions:
  contents: read
  statuses: write

jobs:
  shell_syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell script syntax
        shell: bash
        run: |
          bash tools/ci/check_shell_syntax_v3.sh

      - name: Publish compatibility status context (pull_request)
        if: github.event_name == "pull_request"
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: "success",
              context: "ci-shell-syntax-v1 / shell_syntax (pull_request)",
              description: "Compatibility status for branch protection",
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
