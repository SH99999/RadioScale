name: dev-branch-refresh-v1

on:
  push:
    branches:
      - main
  schedule:
    - cron: '13 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Refresh dev branches from main
        env:
          EXCLUDE_BRANCHES: ""
        run: |
          bash tools/ci/refresh_dev_branches_from_main_v1.sh
